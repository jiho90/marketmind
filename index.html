<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketMind — Competitor Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --navy-dark: #0a192f;
            --navy-medium: #112240;
            --navy-light: #233554;
            --white: #f8fafc;
            --gray: #94a3b8;
            --accent: #64ffda;
            --border: #303c55;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            color: var(--navy-dark);
            line-height: 1.6;
        }

        /* Header */
        header {
            background-color: var(--navy-dark);
            color: var(--white);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--gray);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .hero-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            margin-bottom: 2rem;
            background-color: var(--navy-medium); /* Placeholder color if image fails */
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .controls {
            margin-bottom: 2rem;
            display: flex;
            justify-content: flex-start;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--navy-light);
        }

        /* Table Styling */
        .table-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--navy-dark);
            color: var(--white);
        }

        th {
            padding: 1rem 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f1f5f9;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-container {
            background: white;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 12px;
            overflow-y: auto;
            position: relative;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 1rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--navy-dark);
            cursor: pointer;
            line-height: 1;
        }

        .deep-dive-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .swot-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .swot-box {
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .swot-s { background: #dcfce7; color: #166534; }
        .swot-w { background: #fee2e2; color: #991b1b; }
        .swot-o { background: #dbeafe; color: #1e40af; }
        .swot-t { background: #fef9c3; color: #854d0e; }

        .metrics-bar {
            display: flex;
            justify-content: space-between;
            background: var(--navy-dark);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .metric-item {
            text-align: center;
        }

        .metric-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .metric-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--gray);
        }

        .timeline {
            margin-top: 1rem;
            border-left: 2px solid #e2e8f0;
            padding-left: 1.5rem;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -1.95rem;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--navy-light);
            border: 2px solid white;
        }

        .timeline-date {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--navy-light);
        }

        .timeline-desc {
            font-size: 0.85rem;
            color: #64748b;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .dot-green { background-color: #22c55e; }
        .dot-yellow { background-color: #eab308; }
        .dot-red { background-color: #ef4444; }

        .funding-badge {
            background-color: #dcfce7;
            color: #166534;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .score-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .score-green { background-color: #dcfce7; color: #166534; }
        .score-yellow { background-color: #fef9c3; color: #854d0e; }
        .score-red { background-color: #fee2e2; color: #991b1b; }

        .description-cell {
            color: #64748b;
            font-size: 0.85rem;
            max-width: 300px;
        }

        /* Footer */
        footer {
            background-color: var(--navy-dark);
            color: var(--gray);
            padding: 2rem;
            text-align: center;
            font-size: 0.9rem;
            margin-top: 4rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            th, td {
                padding: 0.75rem;
            }
            .description-cell {
                display: none;
            }
            th:nth-child(6), td:nth-child(6) {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="nanobanana-output/hero.png" alt="MarketMind hero" class="hero-image">
        <h1>MarketMind</h1>
        <p>Know your competition, own your market</p>
    </header>

    <main>
        <div class="controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search competitors, products, or descriptions...">
            </div>
        </div>

        <div class="table-wrapper">
            <table id="competitorTable">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Founded</th>
                        <th>Funding ($M)</th>
                        <th>Employees</th>
                        <th>Market Score</th>
                        <th>Key Product</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>

        <section class="chart-section" style="margin-top: 4rem;">
            <h2 style="margin-bottom: 1.5rem; color: var(--navy-dark); font-size: 1.5rem; font-weight: 700;">Funding Comparison ($M)</h2>
            <div style="background: white; padding: 2rem; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                <canvas id="fundingChart" height="100"></canvas>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 MarketMind Intelligence Systems. All rights reserved.
        <br>Last updated: May 20, 2026
    </footer>

    <div id="deepDiveModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modalCompanyName" style="font-size: 2rem; font-weight: 800; color: var(--navy-dark);">Company Name</h2>
                <button class="close-btn" onclick="closeDeepDive()">&times;</button>
            </div>
            
            <div id="modalMetrics" class="metrics-bar">
                <!-- Metrics injected here -->
            </div>

            <div class="deep-dive-grid">
                <div>
                    <h3 style="margin-bottom: 1rem; font-size: 1.1rem; text-transform: uppercase; color: var(--gray);">SWOT Analysis</h3>
                    <div id="modalSWOT" class="swot-container">
                        <!-- SWOT injected here -->
                    </div>
                </div>
                <div>
                    <h3 style="margin-bottom: 1rem; font-size: 1.1rem; text-transform: uppercase; color: var(--gray);">Funding Timeline</h3>
                    <div id="modalTimeline" class="timeline">
                        <!-- Timeline injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const competitors = [
            {
                name: "AnalytixIO",
                founded: 2020,
                funding: 45,
                employees: 200,
                product: "Predictive BI",
                description: "AI-driven market insights for enterprise retail brands.",
                swot: { s: "Large dataset", w: "High burn rate", o: "Predictive AI", t: "SaaS consolidation" },
                metrics: { cac: "$850", ltv: "$12k", churn: "2.1%" },
                timeline: [{ date: "Aug 2020", desc: "Seed Round ($5M)" }, { date: "Nov 2021", desc: "Series A ($40M)" }]
            },
            {
                name: "DevPulse",
                founded: 2019,
                funding: 28,
                employees: 120,
                product: "Velocity Tracking",
                description: "Deep engineering metrics to optimize sprint performance.",
                swot: { s: "First mover", w: "Niche market", o: "Git integration", t: "Open source tools" },
                metrics: { cac: "$420", ltv: "$5.5k", churn: "1.5%" },
                timeline: [{ date: "May 2019", desc: "Seed ($3M)" }, { date: "Jan 2021", desc: "Series A ($25M)" }]
            },
            {
                name: "CloudSync",
                founded: 2021,
                funding: 12,
                employees: 45,
                product: "Auto-Backup",
                description: "Seamless real-time data synchronization for distributed teams.",
                swot: { s: "Speed/Latency", w: "Storage costs", o: "Edge computing", t: "Hyperscalers" },
                metrics: { cac: "$120", ltv: "$2.2k", churn: "0.9%" },
                timeline: [{ date: "Feb 2021", desc: "Pre-seed ($2M)" }, { date: "Mar 2022", desc: "Series A ($10M)" }]
            },
            {
                name: "SecureFlow",
                founded: 2022,
                funding: 8,
                employees: 30,
                product: "Zero-Trust VPN",
                description: "Next-gen network security for the modern remote workforce.",
                swot: { s: "Security tech", w: "Small sales team", o: "Gov compliance", t: "Legacy VPNs" },
                metrics: { cac: "$210", ltv: "$3.8k", churn: "1.1%" },
                timeline: [{ date: "Jan 2022", desc: "Seed ($8M)" }]
            },
            {
                name: "TalentMap",
                founded: 2023,
                funding: 5,
                employees: 15,
                product: "Hiring Intelligence",
                description: "AI sourcing platform that finds hidden tech gems.",
                swot: { s: "AI algorithms", w: "New brand", o: "Remote hiring", t: "LinkedIn Talent" },
                metrics: { cac: "$85", ltv: "$1.5k", churn: "0.5%" },
                timeline: [{ date: "Apr 2023", desc: "Seed ($5M)" }]
            }
        ];

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const deepDiveModal = document.getElementById('deepDiveModal');
        const ctx = document.getElementById('fundingChart').getContext('2d');
        let fundingChart;

        function openDeepDive(name) {
            const company = competitors.find(c => c.name === name);
            if (!company) return;

            document.getElementById('modalCompanyName').innerText = company.name;
            
            // Metrics
            document.getElementById('modalMetrics').innerHTML = `
                <div class="metric-item"><span class="metric-value">${company.metrics.cac}</span><span class="metric-label">Avg CAC</span></div>
                <div class="metric-item"><span class="metric-value">${company.metrics.ltv}</span><span class="metric-label">LTV</span></div>
                <div class="metric-item"><span class="metric-value">${company.metrics.churn}</span><span class="metric-label">Churn</span></div>
            `;

            // SWOT
            document.getElementById('modalSWOT').innerHTML = `
                <div class="swot-box swot-s"><strong>Strengths</strong><br>${company.swot.s}</div>
                <div class="swot-box swot-w"><strong>Weaknesses</strong><br>${company.swot.w}</div>
                <div class="swot-box swot-o"><strong>Opportunities</strong><br>${company.swot.o}</div>
                <div class="swot-box swot-t"><strong>Threats</strong><br>${company.swot.t}</div>
            `;

            // Timeline
            document.getElementById('modalTimeline').innerHTML = company.timeline.map(event => `
                <div class="timeline-item">
                    <div class="timeline-date">${event.date}</div>
                    <div class="timeline-desc">${event.desc}</div>
                </div>
            `).join('');

            deepDiveModal.style.display = 'flex';
        }

        function closeDeepDive() {
            deepDiveModal.style.display = 'none';
        }

        // Close on overlay click
        deepDiveModal.addEventListener('click', (e) => {
            if (e.target === deepDiveModal) closeDeepDive();
        });

        function initChart(data) {
            const chartData = {
                labels: data.map(c => c.name),
                datasets: [{
                    label: 'Funding ($M)',
                    data: data.map(c => c.funding),
                    backgroundColor: '#112240',
                    borderColor: '#0a192f',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            };

            fundingChart = new Chart(ctx, {
                type: 'bar',
                data: chartData,
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { display: false }
                        },
                        y: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateChart(data) {
            fundingChart.data.labels = data.map(c => c.name);
            fundingChart.data.datasets[0].data = data.map(c => c.funding);
            fundingChart.update();
        }

        function renderTable(data) {
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 3rem; color: #94a3b8;">No matches found.</td></tr>';
                return;
            }

            // Calculate scores and sort descending
            const scoredData = data.map(item => ({
                ...item,
                score: parseFloat(((item.funding / 10) + (item.employees / 100)).toFixed(2))
            })).sort((a, b) => b.score - a.score);

            scoredData.forEach((item, index) => {
                let statusClass = 'dot-red';
                if (item.funding > 50) statusClass = 'dot-green';
                else if (item.funding >= 10) statusClass = 'dot-yellow';

                // Color code Market Score (Top 2 Green, Bottom 2 Red, Others Yellow)
                let scoreClass = 'score-yellow';
                if (index < 2) scoreClass = 'score-green';
                else if (index >= scoredData.length - 2) scoreClass = 'score-red';

                const row = document.createElement('tr');
                row.style.cursor = 'pointer';
                row.onclick = () => openDeepDive(item.name);
                row.innerHTML = `
                    <td style="font-weight: 700;"><span class="status-dot ${statusClass}"></span>${item.name}</td>
                    <td>${item.founded}</td>
                    <td><span class="funding-badge">$${item.funding}M</span></td>
                    <td>${item.employees}</td>
                    <td><span class="score-badge ${scoreClass}">${item.score}</span></td>
                    <td>${item.product}</td>
                    <td class="description-cell">${item.description}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = competitors.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.product.toLowerCase().includes(term) || 
                c.description.toLowerCase().includes(term)
            );
            renderTable(filtered);
            updateChart(filtered);
        });

        // Initial render
        renderTable(competitors);
        initChart(competitors);
    </script>
</body>
</html>
